<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم القناة | Firebase</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>body { background: #f8f9fa; padding: 20px; font-family: 'Segoe UI', sans-serif; }</style>
</head>
<body>

<div class="container" style="max-width: 600px;">
    <h3 class="text-center mb-4">🔴 وحدة التحكم بالبث المباشر</h3>
    
    <div class="card p-4 shadow-sm">
        <div class="mb-3">
            <label>حالة الاتصال:</label>
            <span id="status-badge" class="badge bg-secondary">جاري الاتصال...</span>
        </div>

        <hr>

        <h5 class="mb-3">ماذا تريد أن تعرض الآن؟</h5>
        <div class="mb-3">
            <select id="type" class="form-select mb-2">
                <option value="youtube">يوتيوب (فيديو أو بث مباشر)</option>
                <option value="direct">رابط مباشر (MP4 / M3U8)</option>
            </select>
            <input type="text" id="url" class="form-control" placeholder="معرف الفيديو (ID) أو الرابط المباشر">
            <small class="text-muted">لليوتيوب ضع المعرف فقط (مثل: jfKfPfyJRdk)</small>
        </div>

        <div class="mb-3">
            <label>شريط الأخبار:</label>
            <input type="text" id="ticker" class="form-control" placeholder="اكتب النص هنا...">
        </div>

        <button id="broadcast-btn" class="btn btn-danger w-100 btn-lg">🚀 بث الآن (مزامنة الجميع)</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBxqN1tGzv6bY95FtrbhmUxYucucJ_4veY",
        authDomain: "ahmdiya-f99f2.firebaseapp.com",
        databaseURL: "https://ahmdiya-f99f2-default-rtdb.firebaseio.com",
        projectId: "ahmdiya-f99f2",
        storageBucket: "ahmdiya-f99f2.firebasestorage.app",
        messagingSenderId: "831329583457",
        appId: "1:831329583457:web:acbf686be2c624b4780520",
        measurementId: "G-73QPC6RXM3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // تغيير حالة الاتصال في الواجهة
    document.getElementById('status-badge').className = "badge bg-success";
    document.getElementById('status-badge').innerText = "متصل بـ Firebase";

    document.getElementById('broadcast-btn').addEventListener('click', () => {
        const type = document.getElementById('type').value;
        const url = document.getElementById('url').value;
        const ticker = document.getElementById('ticker').value;

        if(!url) return alert("الرجاء وضع رابط أو معرف فيديو");

        // الإرسال لقاعدة البيانات
        set(ref(db, 'channel_status'), {
            type: type,
            url: url,
            ticker: ticker || "أهلاً بكم في قناة الأحمدية",
            startTime: Date.now(), // هذا هو سر المزامنة!
            timestamp: Date.now()
        }).then(() => {
            alert("✅ تم تحديث البث! سيتم مزامنة جميع المشاهدين لهذه اللحظة.");
        }).catch((error) => {
            alert("خطأ: " + error.message);
        });
    });
</script>

</body>
</html>
