<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>مدير القوائم | قناة الأحمدية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f0f2f5; font-family: 'Segoe UI', sans-serif; padding: 20px; }
        .card { border: none; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .playlist-item { background: #fff; padding: 10px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        .playlist-item:last-child { border-bottom: none; }
        .duration-badge { background: #e74c3c; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.8rem; }
    </style>
</head>
<body>

<div class="container" style="max-width: 900px;">
    <h2 class="text-center mb-4 text-primary">🎛️ ستوديو القوائم المتزامنة</h2>

    <div class="row">
        <div class="col-md-5">
            <div class="card p-3 mb-3">
                <h5 class="mb-3">1. إضافة فيديو للقائمة</h5>
                
                <label>نوع الفيديو:</label>
                <select id="vid-type" class="form-select mb-2">
                    <option value="youtube">يوتيوب (ID)</option>
                    <option value="direct">ملف مباشر (URL)</option>
                </select>

                <label>الرابط أو المعرف:</label>
                <input type="text" id="vid-url" class="form-control mb-2" placeholder="مثال: jfKfPfyJRdk">

                <label>العنوان:</label>
                <input type="text" id="vid-title" class="form-control mb-2" placeholder="عنوان الفيديو">

                <label class="text-danger fw-bold">المدة (بالثواني) - هام جداً:</label>
                <div class="input-group mb-3">
                    <input type="number" id="vid-duration" class="form-control" placeholder="مثال: 300 (لـ 5 دقائق)">
                    <span class="input-group-text">ثانية</span>
                </div>

                <button onclick="addToQueue()" class="btn btn-primary w-100">➕ إضافة للقائمة</button>
            </div>

            <div class="card p-3">
                <h5>إعدادات إضافية</h5>
                <input type="text" id="ticker-text" class="form-control mb-2" placeholder="نص الشريط الإخباري...">
                <button onclick="updateSettingsOnly()" class="btn btn-warning w-100 btn-sm">تحديث الشريط فقط</button>
            </div>
        </div>

        <div class="col-md-7">
            <div class="card p-3 h-100">
                <h5 class="mb-3">2. قائمة التشغيل الحالية (Queue)</h5>
                
                <div id="playlist-container" class="border rounded bg-light mb-3" style="min-height: 200px; max-height: 400px; overflow-y: auto;">
                    <p class="text-center text-muted p-4" id="empty-msg">القائمة فارغة. أضف فيديوهات من اليمين.</p>
                </div>

                <div class="d-flex justify-content-between align-items-center bg-white p-2 rounded border mb-3">
                    <strong>المدة الكلية للقائمة:</strong>
                    <span id="total-duration" class="badge bg-dark">0 ثانية</span>
                </div>

                <button onclick="publishPlaylist()" class="btn btn-success btn-lg w-100">🚀 بدء تشغيل القائمة المتزامنة للجميع</button>
                <small class="text-muted text-center d-block mt-2">عند الضغط، سيتم بدء القائمة من البداية عند جميع المشاهدين في نفس اللحظة.</small>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
    import { getDatabase, ref, set, update } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

    const firebaseConfig = {
        apiKey: "AIzaSyBxqN1tGzv6bY95FtrbhmUxYucucJ_4veY",
        authDomain: "ahmdiya-f99f2.firebaseapp.com",
        databaseURL: "https://ahmdiya-f99f2-default-rtdb.firebaseio.com",
        projectId: "ahmdiya-f99f2",
        storageBucket: "ahmdiya-f99f2.firebasestorage.app",
        messagingSenderId: "831329583457",
        appId: "1:831329583457:web:acbf686be2c624b4780520",
        measurementId: "G-73QPC6RXM3"
    };

    const app = initializeApp(firebaseConfig);
    const db = getDatabase(app);

    // مصفوفة لتخزين القائمة محلياً قبل الإرسال
    window.playlistQueue = [];

    window.addToQueue = () => {
        const type = document.getElementById('vid-type').value;
        const url = document.getElementById('vid-url').value;
        const title = document.getElementById('vid-title').value;
        const duration = parseInt(document.getElementById('vid-duration').value);

        if(!url || !duration) return alert("الرابط والمدة مطلوبان!");

        const item = {
            type: type,
            id: (type === 'youtube') ? url : null, // لليوتيوب نستخدم المعرف
            url: (type === 'direct') ? url : null, // للمباشر نستخدم الرابط
            title: title || "فيديو",
            duration: duration
        };

        window.playlistQueue.push(item);
        renderQueue();
        
        // تنظيف الحقول
        document.getElementById('vid-url').value = '';
        document.getElementById('vid-title').value = '';
        document.getElementById('vid-duration').value = '';
    };

    window.removeFromQueue = (index) => {
        window.playlistQueue.splice(index, 1);
        renderQueue();
    };

    function renderQueue() {
        const container = document.getElementById('playlist-container');
        const emptyMsg = document.getElementById('empty-msg');
        const totalBadge = document.getElementById('total-duration');
        
        container.innerHTML = "";
        let totalSec = 0;

        if(window.playlistQueue.length === 0) {
            container.appendChild(emptyMsg);
            totalBadge.innerText = "0 ثانية";
            return;
        }

        window.playlistQueue.forEach((item, index) => {
            totalSec += item.duration;
            container.innerHTML += `
                <div class="playlist-item">
                    <div>
                        <strong>${index+1}. ${item.title}</strong>
                        <small class="text-muted d-block">${item.type}</small>
                    </div>
                    <div>
                        <span class="duration-badge">${item.duration} ث</span>
                        <button onclick="removeFromQueue(${index})" class="btn btn-sm btn-outline-danger ms-2">x</button>
                    </div>
                </div>
            `;
        });

        // تحويل الثواني لدقائق للعرض
        const minutes = Math.floor(totalSec / 60);
        const seconds = totalSec % 60;
        totalBadge.innerText = `${minutes} دقيقة و ${seconds} ثانية`;
    }

    // زر الإطلاق الكبير
    window.publishPlaylist = () => {
        if(window.playlistQueue.length === 0) return alert("القائمة فارغة!");

        const ticker = document.getElementById('ticker-text').value;

        // إرسال البيانات لـ Firebase
        set(ref(db, 'channel_status'), {
            playlist: window.playlistQueue,
            playlistStartTime: Date.now(), // لحظة الصفر التي سيعتمد عليها الجميع
            tickerText: ticker || "أهلاً بكم في قناة الأحمدية",
            tickerSpeed: 25,
            sponsor: { show: false } // إعادة تعيين الراعي
        }).then(() => {
            alert("✅ تم إطلاق القائمة! ستبدأ الآن عند جميع المشاهدين.");
        });
    };

    window.updateSettingsOnly = () => {
        const ticker = document.getElementById('ticker-text').value;
        if(ticker) {
            update(ref(db, 'channel_status'), { tickerText: ticker })
            .then(() => alert("تم تحديث الشريط"));
        }
    };
</script>

</body>
</html>
