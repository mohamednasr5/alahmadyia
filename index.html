<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>قناة الأحمدية | بث مباشر</title>
<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<style>
body,html{margin:0;height:100%;background:#000;overflow:hidden;color:#fff;font-family:Cairo}
video{width:100%;height:100%;object-fit:contain}
#ticker{position:fixed;bottom:0;width:100%;height:60px;background:#c0392b;display:flex;align-items:center;overflow:hidden;font-weight:bold;font-size:20px}
#tickerText{white-space:nowrap;position:absolute}
.sideAd{position:fixed;top:30%;width:200px;display:none}
#rightAd{right:10px}
#leftAd{left:10px}
#sponsor{position:fixed;top:10px;left:50%;transform:translateX(-50%);display:none;background:#fff;padding:5px;border-radius:5px}
#sponsor img{max-height:40px}
</style>
</head>
<body>

<video id="player" autoplay muted playsinline></video>

<div id="rightAd" class="sideAd"><img id="rightImg" width="100%"></div>
<div id="leftAd" class="sideAd"><img id="leftImg" width="100%"></div>
<div id="sponsor"><img id="sponsorImg"></div>
<div id="ticker"><div id="tickerText"></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBxqN1tGzv6bY95FtrbhmUxYucucJ_4veY",
authDomain:"ahmdiya-f99f2.firebaseapp.com",
databaseURL:"https://ahmdiya-f99f2-default-rtdb.firebaseio.com",
projectId:"ahmdiya-f99f2",
storageBucket:"ahmdiya-f99f2.appspot.com",
messagingSenderId:"831329583457",
appId:"1:831329583457:web:acbf686be2c624b4780520"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

const player=document.getElementById("player");
const tickerText=document.getElementById("tickerText");

let lastHash="";
let tickerInterval=null;

function startTicker(text,speed,dir){
if(tickerInterval) clearInterval(tickerInterval);

tickerText.innerText=text;
let start=dir==="rtl"?window.innerWidth:-tickerText.offsetWidth;
let end=dir==="rtl"?-tickerText.offsetWidth:window.innerWidth;
tickerText.style.left=start+"px";

tickerInterval=setInterval(()=>{
start+=dir==="rtl"?-2:2;
if((dir==="rtl"&&start<=end)||(dir==="ltr"&&start>=end)){
start=dir==="rtl"?window.innerWidth:-tickerText.offsetWidth;
}
tickerText.style.left=start+"px";
},20);
}

onValue(ref(db,"channel_status"),snap=>{
const data=snap.val();
if(!data) return;

const hash=JSON.stringify(data);
if(hash===lastHash) return;
lastHash=hash;

if(data.tickerText) startTicker(data.tickerText,data.tickerSpeed||30,data.tickerDirection||"rtl");

if(data.sideAds?.right?.show){
rightAd.style.display="block";
rightImg.src=data.sideAds.right.url;
}else rightAd.style.display="none";

if(data.sideAds?.left?.show){
leftAd.style.display="block";
leftImg.src=data.sideAds.left.url;
}else leftAd.style.display="none";

if(data.sponsor?.show){
sponsor.style.display="block";
sponsorImg.src=data.sponsor.url;
}else sponsor.style.display="none";

if(data.playlist && data.playlist.length>0){
let url=data.playlist[0].url;
if(Hls.isSupported() && url.includes(".m3u8")){
let hls=new Hls();
hls.loadSource(url);
hls.attachMedia(player);
}else{
player.src=url;
}
player.play().catch(()=>{});
}
});
</script>

</body>
</html>
