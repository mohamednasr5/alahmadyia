<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة التحكم | قناة الأحمدية</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
body{margin:0;font-family:Cairo;background:#111;color:#fff}
.container{max-width:1000px;margin:auto;padding:20px}
input,select,button{padding:10px;margin:5px 0;width:100%;border:none;border-radius:6px}
button{background:#c0392b;color:#fff;font-weight:bold;cursor:pointer}
button:hover{opacity:.9}
.section{background:#1c1c1c;padding:20px;border-radius:10px;margin-bottom:20px}
h2{margin-top:0;color:#f39c12}
</style>
</head>
<body>

<div class="container">

<div class="section">
<h2>الشريط الإخباري</h2>
<input id="tickerText" placeholder="نص الشريط">
<input type="number" id="tickerSpeed" placeholder="سرعة (بالثواني)" value="30">
<select id="tickerDirection">
<option value="rtl">يمين → يسار</option>
<option value="ltr">يسار → يمين</option>
</select>
<button onclick="updateTicker()">تحديث الشريط</button>
</div>

<div class="section">
<h2>الإعلانات الجانبية</h2>
<label><input type="checkbox" id="adRightShow"> إعلان يمين</label>
<input id="adRightUrl" placeholder="رابط صورة إعلان يمين">
<label><input type="checkbox" id="adLeftShow"> إعلان يسار</label>
<input id="adLeftUrl" placeholder="رابط صورة إعلان يسار">
<button onclick="updateAds()">حفظ الإعلانات</button>
</div>

<div class="section">
<h2>الراعي</h2>
<label><input type="checkbox" id="sponsorShow"> إظهار الراعي</label>
<input id="sponsorUrl" placeholder="رابط لوجو الراعي">
<button onclick="updateSponsor()">حفظ الراعي</button>
</div>

<div class="section">
<h2>بث فيديو مباشر</h2>
<input id="videoUrl" placeholder="رابط mp4 أو m3u8">
<button onclick="goLive()">بدء البث</button>
<button onclick="stopLive()">إيقاف البث</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-app.js";
import { getDatabase, ref, update, remove } from "https://www.gstatic.com/firebasejs/9.22.0/firebase-database.js";

const firebaseConfig={
apiKey:"AIzaSyBxqN1tGzv6bY95FtrbhmUxYucucJ_4veY",
authDomain:"ahmdiya-f99f2.firebaseapp.com",
databaseURL:"https://ahmdiya-f99f2-default-rtdb.firebaseio.com",
projectId:"ahmdiya-f99f2",
storageBucket:"ahmdiya-f99f2.appspot.com",
messagingSenderId:"831329583457",
appId:"1:831329583457:web:acbf686be2c624b4780520"
};

const app=initializeApp(firebaseConfig);
const db=getDatabase(app);

window.updateTicker=()=>{
update(ref(db,"channel_status"),{
tickerText:document.getElementById("tickerText").value,
tickerSpeed:document.getElementById("tickerSpeed").value,
tickerDirection:document.getElementById("tickerDirection").value
});
};

window.updateAds=()=>{
update(ref(db,"channel_status"),{
sideAds:{
right:{
show:document.getElementById("adRightShow").checked,
url:document.getElementById("adRightUrl").value
},
left:{
show:document.getElementById("adLeftShow").checked,
url:document.getElementById("adLeftUrl").value
}
}
});
};

window.updateSponsor=()=>{
update(ref(db,"channel_status"),{
sponsor:{
show:document.getElementById("sponsorShow").checked,
url:document.getElementById("sponsorUrl").value
}
});
};

window.goLive=()=>{
update(ref(db,"channel_status"),{
playlist:[{type:"direct",url:document.getElementById("videoUrl").value,duration:999999}],
playlistStartTime:Date.now()
});
};

window.stopLive=()=>{
remove(ref(db,"channel_status/playlist"));
remove(ref(db,"channel_status/playlistStartTime"));
};
</script>

</body>
</html>
